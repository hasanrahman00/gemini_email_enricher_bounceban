<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Email Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- ─── Topbar ─── -->
    <header class="topbar">
      <div class="topbar__left">
        <div class="topbar__logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="1" y="1" width="22" height="22" rx="6" stroke="var(--accent)" stroke-width="2"/>
            <path d="M7 12h10M12 7v10" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="topbar__name">Gemini Scraper</span>
        <span class="topbar__version">v1.1</span>
      </div>
      <div class="topbar__right">
        <div class="topbar__cdp" id="cdpStatus">
          <span class="dot" id="cdpDot"></span>
          <span id="cdpLabel">Checking…</span>
        </div>
      </div>
    </header>

    <!-- ─── Upload ─── -->
    <section class="panel upload-panel" id="uploadPanel">
      <div class="upload-drop" id="dropZone">
        <svg class="upload-drop__icon" width="40" height="40" viewBox="0 0 24 24" fill="none"
             stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="upload-drop__title">Drop your CSV or XLSX here</p>
        <p class="upload-drop__hint">or click to browse files</p>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" hidden />
      </div>

      <div class="upload-ready hidden" id="uploadReady">
        <div class="upload-ready__file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span class="upload-ready__name" id="fileName">file.csv</span>
          <button class="btn-x" id="clearFile" title="Remove">×</button>
        </div>
        <div class="upload-ready__row">
          <input class="input" id="jobName" placeholder="Job name (optional)" />
          <button class="btn btn--accent" id="runBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21"/></svg>
            Run
          </button>
        </div>
      </div>

      <div class="upload-cols">
        <span class="upload-cols__label">Required:</span>
        <code>Company Name</code><code>Website</code><code>First Name</code>
        <code>Last Name</code><code>Job Title</code><code>Person LinkedIn Url</code>
        <code>Email</code><code>Status</code>
        <span class="upload-cols__sep">·</span>
        <span class="upload-cols__label">Optional:</span>
        <code>Website_one</code><code>Website_two</code>
      </div>
    </section>

    <!-- ─── Jobs ─── -->
    <section class="panel jobs-panel">
      <div class="jobs-head">
        <h2 class="jobs-head__title">Jobs</h2>
        <button class="btn btn--ghost btn--sm" id="refreshBtn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 105.64-12.36L1 10"/>
          </svg>
        </button>
      </div>
      <div id="jobsList">
        <div class="jobs-empty" id="jobsEmpty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--border-hi)" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
          </svg>
          <p>No jobs yet</p>
        </div>
      </div>
    </section>

  </div>

  <!-- ─── Log Modal ─── -->
  <div class="modal-bg hidden" id="logModal">
    <div class="modal">
      <div class="modal__bar">
        <span class="modal__title" id="logTitle">Logs</span>
        <div class="modal__actions">
          <button class="btn-x" id="logClear" title="Clear display">⌫</button>
          <button class="btn-x" id="logClose" title="Close">×</button>
        </div>
      </div>
      <pre class="modal__log" id="logOutput"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
